<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Split It - Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <select id="langSel" onchange="changeLang()">
                <option value="RU">RU</option>
                <option value="EN">EN</option>
            </select>
            <select id="baseCurr" onchange="calculateAll()">
                <option value="KZT">Base: ₸</option>
                <option value="USD">Base: $</option>
                <option value="EUR">Base: €</option>
            </select>
            <button class="icon-btn" onclick="location.reload()">🔄</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-cafe" onclick="openTab('cafe')">Кафе</button>
            <button class="tab-btn" id="btn-rent" onclick="openTab('rent')">Аренда</button>
            <button class="tab-btn" id="btn-travel" onclick="openTab('travel')">Поездка</button>
        </div>

        <div id="cafe" class="tab-content active">
            <label id="lbl-total">СУММА СЧЕТА</label>
            <div class="input-with-icon">
                <input type="number" id="totalAmount" placeholder="0.00" inputmode="decimal">
                <button class="cam-btn" onclick="openCamera()">📷</button>
            </div>

            <div class="settings-grid">
                <div>
                    <label id="lbl-curr">ВАЛЮТА ЧЕКА</label>
                    <select id="currencySelect" onchange="calculateAll()">
                        <option value="KZT">₸ (KZT)</option>
                        <option value="USD">$ (USD)</option>
                        <option value="EUR">€ (EUR)</option>
                        <option value="RUB">₽ (RUB)</option>
                    </select>
                </div>
                <div>
                    <label id="lbl-service">СЕРВИС 10%</label>
                    <label class="switch">
                        <input type="checkbox" id="serviceTax" onchange="calculateAll()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="participantsList"></div>
            <button class="secondary-btn" id="btn-add-p" onclick="addPerson('participantsList', 'cafe')">+ Человек</button>

            <div class="result-card">
                <div class="res-line">
                    <span id="lbl-per-person">На каждого:</span>
                    <span class="result-val" id="valCafe">0 ₸</span>
                </div>
                <button class="main-btn" id="btn-share-c" onclick="share('cafe')">Поделиться</button>
            </div>
        </div>

        <div id="rent" class="tab-content">
            <label id="lbl-rent-total">АРЕНДА + КОММУНАЛКА</label>
            <input type="number" id="rentTotal" placeholder="0.00" oninput="calculateAll()">
            
            <div id="rentParticipants"></div>
            <button class="secondary-btn" id="btn-add-r" onclick="addPerson('rentParticipants', 'rent')">+ Жилец</button>
            
            <div class="result-card">
                <div class="res-line">
                    <span id="lbl-per-rent">С человека:</span>
                    <span class="result-val" id="valRent">0 ₸</span>
                </div>
                <button class="main-btn" id="btn-share-r" onclick="share('rent')">Поделиться</button>
            </div>
        </div>

        <div id="travel" class="tab-content">
            <label id="lbl-trip-name">НАЗВАНИЕ ПОЕЗДКИ</label>
            <input type="text" id="tripName" placeholder="Напр: Грузия 2026">
            
            <div id="travelExpenses"></div>
            <button class="secondary-btn" id="btn-add-ex" onclick="addExpense()">+ Расход</button>
            
            <div id="travelParticipants"></div>
            <button class="secondary-btn" id="btn-add-tp" onclick="addPerson('travelParticipants', 'travel')">+ Участник</button>
            
            <div class="result-card">
                <div class="res-line">
                    <span id="lbl-trip-res">Итого с каждого:</span>
                    <span class="result-val" id="valTravel">0 ₸</span>
                </div>
                <button class="main-btn" id="btn-share-t" onclick="share('travel')">Поделиться итогами</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
