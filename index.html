<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Split It Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="global-settings">
            <select id="langSwitch" onchange="changeLang()">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
            <select id="baseCurrency" onchange="calculateAll()">
                <option value="KZT">Base: ₸</option>
                <option value="USD">Base: $</option>
                <option value="EUR">Base: €</option>
                <option value="RUB">Base: ₽</option>
            </select>
            <button class="reset-btn" onclick="resetApp()">🔄</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="t-cafe" onclick="openTab('cafe')">Кафе</button>
            <button class="tab-btn" id="t-rent" onclick="openTab('rent')">Аренда</button>
            <button class="tab-btn" id="t-travel" onclick="openTab('travel')">Поездка</button>
        </div>

        <div id="cafe" class="tab-content active">
            <div class="input-group">
                <label id="l-sum">Сумма счета</label>
                <div class="ocr-wrapper">
                    <input type="number" id="totalAmount" placeholder="0.00">
                    <label for="ocr-input" class="ocr-btn">📷</label>
                    <input type="file" id="ocr-input" accept="image/*" style="display:none" onchange="scanReceipt(this)">
                </div>
            </div>
            <div id="receiptPreview"></div> <div class="settings-grid">
                <div class="input-group">
                    <label id="l-curr">Валюта чека</label>
                    <select id="currencySelect" onchange="calculateAll()">
                        <option value="KZT">₸</option>
                        <option value="USD">$</option>
                        <option value="EUR">€</option>
                        <option value="RUB">₽</option>
                    </select>
                </div>
                <div class="input-group">
                    <label id="l-tax">Сервис 10%</label>
                    <label class="switch"><input type="checkbox" id="serviceTax" onchange="calculateAll()"><span class="slider"></span></label>
                </div>
            </div>
            <div id="participantsList"></div>
            <button class="secondary-btn" id="b-add-p" onclick="addParticipant('participantsList')">+ Человек</button>
            <div class="result-area">
                <div class="res-line"><span id="l-per">На каждого:</span> <span id="valCafe">0</span></div>
                <button class="main-btn" id="b-share" onclick="share('cafe')">Поделиться</button>
            </div>
        </div>

        </div>
    <script src="script.js"></script>
</body>
</html>
