<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Split It</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('cafe')">Кафе</button>
            <button class="tab-btn" onclick="openTab('travel')">Поездка / Аренда</button>
        </div>

        <div id="cafe" class="tab-content active">
            <div class="input-group">
                <label>Общая сумма</label>
                <input type="number" id="totalAmount" placeholder="0.00" inputmode="decimal">
            </div>

            <div class="settings-grid">
                <div class="input-group">
                    <label>Валюта</label>
                    <select id="currencySelect">
                        <option value="KZT">KZT (₸)</option>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="RUB">RUB (₽)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Сервис 10%</label>
                    <label class="switch">
                        <input type="checkbox" id="serviceTax">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="participantsList"></div>
            <button id="addPersonBtn" class="secondary-btn">+ Добавить человека</button>

            <div class="result-card" id="resultArea" style="display: none;">
                <span class="label-light">На каждого:</span>
                <span id="perPersonAmount" class="result-val">0 ₸</span>
                <button id="shareBtn" class="share-btn">Поделиться результатом</button>
            </div>
        </div>

        <div id="travel" class="tab-content">
            <div class="input-group">
                <label>Название группы</label>
                <input type="text" id="tripName" placeholder="Напр: Грузия 2026">
            </div>
            <div id="expensesList"></div>
            <button id="addExpenseBtn" class="secondary-btn">+ Добавить расход</button>
            
            <div class="result-card" id="travelResult" style="display:none;">
                <span class="label-light">Итого с каждого:</span>
                <span id="travelPerPerson" class="result-val">0 ₸</span>
                <button id="shareTravelBtn" class="share-btn">Поделиться итогами</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
