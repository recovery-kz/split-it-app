<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Split It Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('cafe')">Кафе</button>
            <button class="tab-btn" onclick="openTab('rent')">Аренда</button>
            <button class="tab-btn" onclick="openTab('travel')">Поездка</button>
        </div>

        <div id="cafe" class="tab-content active">
            <div class="input-group">
                <label>Сумма счета</label>
                <input type="number" id="totalAmount" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="settings-grid">
                <div class="input-group">
                    <label>Валюта</label>
                    <select id="currencySelect">
                        <option value="KZT">KZT (₸)</option>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Сервис 10%</label>
                    <label class="switch">
                        <input type="checkbox" id="serviceTax">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div id="participantsList"></div>
            <button class="secondary-btn" onclick="addParticipant('participantsList')">+ Добавить человека</button>
            <div class="result-area" id="resCafe">
                <div class="res-line"><span>На каждого:</span> <span id="valCafe">0 ₸</span></div>
                <button class="main-btn" onclick="share('cafe')">Поделиться</button>
            </div>
        </div>

        <div id="rent" class="tab-content">
            <div class="input-group">
                <label>Общая аренда + Коммуналка</label>
                <input type="number" id="rentAmount" placeholder="0.00">
            </div>
            <div id="rentList"></div>
            <button class="secondary-btn" onclick="addParticipant('rentList')">+ Добавить жильца</button>
            <div class="result-area" id="resRent">
                <div class="res-line"><span>С жильца:</span> <span id="valRent">0 ₸</span></div>
                <button class="main-btn" onclick="share('rent')">Поделиться</button>
            </div>
        </div>

        <div id="travel" class="tab-content">
            <div class="input-group">
                <label>Название трипа</label>
                <input type="text" id="tripName" placeholder="Напр: Тбилиси 2026">
            </div>
            <div id="travelExpenses"></div>
            <button class="secondary-btn" onclick="addExpense()">+ Добавить расход</button>
            <div id="travelParticipants"></div>
            <button class="secondary-btn" onclick="addParticipant('travelParticipants')">+ Кто едет?</button>
            <div class="result-area" id="resTravel">
                <div class="res-line"><span>Итого с каждого:</span> <span id="valTravel">0 ₸</span></div>
                <button class="main-btn" onclick="share('travel')">Поделиться итогами</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
