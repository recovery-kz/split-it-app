<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Split It Premium</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <select id="langSel" onchange="changeLang()">
                <option value="RU">RU</option>
                <option value="EN">EN</option>
            </select>
            <select id="baseCurr" onchange="calculateAll()">
                <option value="KZT">Base: ₸</option>
                <option value="USD">Base: $</option>
                <option value="EUR">Base: €</option>
                <option value="RUB">Base: ₽</option>
            </select>
            <button class="icon-btn" onclick="openTab('vault')">📁</button>
            <button class="icon-btn" onclick="resetAll()">🔄</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-cafe" onclick="openTab('cafe')" data-i18n="tab-cafe">Кафе</button>
            <button class="tab-btn" id="tab-rent" onclick="openTab('rent')" data-i18n="tab-rent">Аренда</button>
            <button class="tab-btn" id="tab-travel" onclick="openTab('travel')" data-i18n="tab-travel">Поездка</button>
        </div>

        <div id="cafe" class="tab-content active">
            <label data-i18n="lbl-total">СУММА СЧЕТА</label>
            <div class="input-with-icon">
                <input type="number" id="totalAmount" placeholder="0.00" inputmode="decimal" oninput="calculateAll()">
                <button class="cam-btn" onclick="triggerCamera()">📷</button>
                <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display: none;" onchange="handlePhoto(event)">
            </div>
            <div class="settings-grid">
                <div>
                    <label data-i18n="lbl-curr">ВАЛЮТА</label>
                    <select id="currencySelect" onchange="calculateAll()">
                        <option value="KZT">₸</option>
                        <option value="USD">$</option>
                        <option value="EUR">€</option>
                        <option value="RUB">₽</option>
                    </select>
                </div>
                <div>
                    <label data-i18n="lbl-service">СЕРВИС 10%</label>
                    <label class="switch">
                        <input type="checkbox" id="serviceTax" onchange="calculateAll()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div id="participantsList"></div>
            <button class="secondary-btn" onclick="addPerson('participantsList', 'cafe')" data-i18n="btn-add-p">+ Человек</button>
            
            <div class="result-card">
                <div class="res-line">
                    <span data-i18n="lbl-per-person">На каждого:</span>
                    <span class="result-val" id="valCafe">0 ₸</span>
                </div>
                <button class="main-btn" onclick="share('cafe')" data-i18n="btn-share">Поделиться</button>
            </div>
        </div>

        <div id="rent" class="tab-content">
            <label data-i18n="lbl-rent-total">АРЕНДА + КОММУНАЛКА</label>
            <input type="number" id="rentTotal" placeholder="0.00" oninput="calculateAll()">
            <div id="rentParticipants"></div>
            <button class="secondary-btn" onclick="addPerson('rentParticipants', 'rent')" data-i18n="btn-add-r">+ Жилец</button>
            <div class="result-card">
                <div class="res-line">
                    <span data-i18n="lbl-per-rent">С человека:</span>
                    <span class="result-val" id="valRent">0 ₸</span>
                </div>
                <button class="main-btn" onclick="share('rent')" data-i18n="btn-share">Поделиться</button>
            </div>
        </div>

        <div id="travel" class="tab-content">
            <label data-i18n="lbl-trip-name">НАЗВАНИЕ ПОЕЗДКИ</label>
            <input type="text" id="tripName" placeholder="..." oninput="calculateAll()">
            <div id="travelExpenses"></div>
            <button class="secondary-btn" onclick="addExpense()" data-i18n="btn-add-ex">+ Расход</button>
            <div id="travelParticipants"></div>
            <button class="secondary-btn" onclick="addPerson('travelParticipants', 'travel')" data-i18n="btn-add-tp">+ Участник</button>
            <div class="result-card">
                <div class="res-line">
                    <span data-i18n="lbl-trip-res">Итого с каждого:</span>
                    <span class="result-val" id="valTravel">0 ₸</span>
                </div>
                <button class="main-btn" onclick="share('travel')" data-i18n="btn-share-trip">Поделиться итогами</button>
            </div>
        </div>

        <div id="vault" class="tab-content">
            <h2 style="color:var(--accent); font-size:18px; margin-bottom:15px;" data-i18n="vault-title">СЕЙФ ЧЕКОВ</h2>
            <div id="vaultList"></div>
            <button class="secondary-btn" style="margin-top:20px;" onclick="openTab('cafe')">← Назад</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
