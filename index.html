<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Split It Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <select id="langSel"><option>RU</option></select>
            <select id="baseCurr"><option>Base: ₸</option></select>
            <button class="icon-btn">🔄</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('cafe')">Кафе</button>
            <button class="tab-btn" onclick="openTab('rent')">Аренда</button>
            <button class="tab-btn" onclick="openTab('travel')">Поездка</button>
        </div>

        <div id="cafe" class="tab-content active">
            <label>СУММА СЧЕТА</label>
            <div class="input-with-icon">
                <input type="number" id="totalAmount" placeholder="0.00" inputmode="decimal">
                <button class="cam-btn" onclick="openCamera()">📷</button>
            </div>
            
            <div id="photoPreview" style="display:none; margin-bottom:15px;">
                <img id="capturedPhoto" src="" style="width:100%; border-radius:12px; border:1px solid var(--accent);">
                <p id="scanStatus" style="font-size:12px; color:var(--accent); text-align:center;">Сканирование...</p>
            </div>

            <div class="settings-grid">
                <div>
                    <label>ВАЛЮТА ЧЕКА</label>
                    <select id="currencySelect">
                        <option value="KZT">₸</option>
                        <option value="USD">$</option>
                    </select>
                </div>
                <div>
                    <label>СЕРВИС 10%</label>
                    <label class="switch">
                        <input type="checkbox" id="serviceTax">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="participantsList"></div>
            <button class="secondary-btn" onclick="addPerson('participantsList', 'cafe')">+ Человек</button>

            <div class="result-card">
                <div class="res-line">
                    <span style="color:var(--hint)">На каждого:</span>
                    <span class="result-val" id="valCafe">0</span>
                </div>
                <button class="main-btn" onclick="share('cafe')">Поделиться</button>
            </div>
        </div>

        <div id="rent" class="tab-content">
            <label>ОБЩАЯ СУММА (АРЕНДА + КОМ)</label>
            <input type="number" id="rentTotal" placeholder="0.00" oninput="calculateRent()">
            <div id="rentParticipants"></div>
            <button class="secondary-btn" onclick="addPerson('rentParticipants', 'rent')">+ Жилец</button>
            <div class="result-card">
                <div class="res-line">
                    <span style="color:var(--hint)">С человека:</span>
                    <span class="result-val" id="valRent">0</span>
                </div>
                <button class="main-btn" onclick="share('rent')">Поделиться</button>
            </div>
        </div>

        <div id="travel" class="tab-content">
            <label>НАЗВАНИЕ ПОЕЗДКИ</label>
            <input type="text" placeholder="Напр: Грузия 2026">
            <div id="travelExpenses"></div>
            <button class="secondary-btn" onclick="addExpense()">+ Расход</button>
            <div id="travelParticipants"></div>
            <button class="secondary-btn" onclick="addPerson('travelParticipants', 'travel')">+ Участник</button>
            <div class="result-card">
                <div class="res-line">
                    <span style="color:var(--hint)">Итого:</span>
                    <span class="result-val" id="valTravel">0</span>
                </div>
                <button class="main-btn" onclick="share('travel')">Поделиться</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
